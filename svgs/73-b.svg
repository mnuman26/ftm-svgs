<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a2a1a" rx="12"/>

  <!-- Road -->
  <rect x="0" y="115" width="200" height="50" fill="#2d2d2d"/>
  <rect x="10" y="133" width="20" height="4" fill="#555" rx="2"/>
  <rect x="50" y="133" width="20" height="4" fill="#555" rx="2"/>
  <rect x="90" y="133" width="20" height="4" fill="#555" rx="2"/>
  <rect x="130" y="133" width="20" height="4" fill="#555" rx="2"/>

  <!-- Car (moving right) -->
  <g transform="translate(30, 115)">
    <!-- Body -->
    <rect x="0" y="-28" width="75" height="26" fill="#2e7d32" rx="7"/>
    <!-- Roof -->
    <rect x="12" y="-44" width="48" height="18" fill="#388e3c" rx="5"/>
    <!-- Windows -->
    <rect x="16" y="-42" width="18" height="13" fill="#80deea" rx="2" opacity="0.8"/>
    <rect x="38" y="-42" width="18" height="13" fill="#80deea" rx="2" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="14" cy="0" r="10" fill="#111"/>
    <circle cx="14" cy="0" r="5" fill="#333"/>
    <circle cx="58" cy="0" r="10" fill="#111"/>
    <circle cx="58" cy="0" r="5" fill="#333"/>
    <!-- Headlights -->
    <rect x="70" y="-22" width="5" height="8" fill="#fff9c4" rx="1"/>
    <!-- Open window - arm throwing -->
    <rect x="35" y="-44" width="4" height="13" fill="#1a2a1a"/>
    <!-- Arm -->
    <line x1="39" y1="-36" x2="58" y2="-52" stroke="#ffcc80" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="-54" r="5" fill="#ffcc80"/>
  </g>

  <!-- Thrown object - cigarette/trash - flying arc -->
  <!-- Trajectory dots -->
  <circle cx="98" cy="68" r="2.5" fill="#ff8f00" opacity="0.4"/>
  <circle cx="112" cy="60" r="2.5" fill="#ff8f00" opacity="0.5"/>
  <circle cx="127" cy="58" r="2.5" fill="#ff8f00" opacity="0.6"/>
  <circle cx="142" cy="62" r="2.5" fill="#ff8f00" opacity="0.7"/>
  <circle cx="155" cy="72" r="2.5" fill="#ff8f00" opacity="0.85"/>

  <!-- Cigarette butt on ground -->
  <g transform="translate(162, 88)">
    <rect x="-10" y="-3" width="20" height="6" fill="#f5f5f5" rx="2"/>
    <rect x="7" y="-3" width="5" height="6" fill="#ff8a65" rx="1"/>
    <!-- Smoke -->
    <path d="M10,-5 Q14,-12 10,-18" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M12,-5 Q18,-14 13,-22" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Trash on ground -->
  <g transform="translate(148, 112)">
    <rect x="-6" y="-5" width="12" height="8" fill="#8d6e63" rx="1"/>
    <rect x="-4" y="-8" width="8" height="4" fill="#795548" rx="1"/>
  </g>

  <!-- Big red X / ban symbol -->
  <circle cx="162" cy="88" r="22" fill="none" stroke="#e53935" stroke-width="3" opacity="0.8"/>
  <line x1="146" y1="72" x2="178" y2="104" stroke="#e53935" stroke-width="3" opacity="0.8"/>

  <!-- Warning label -->
  <rect x="25" y="168" width="150" height="22" fill="#e53935" rx="4" opacity="0.9"/>
  <text x="100" y="183" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">ARAÇTAN ŞEY ATMAK</text>
</svg>
