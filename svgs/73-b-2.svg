<rect x="44" y="314" width="292" height="44" rx="5" fill="#FAEEDA" style="fill:rgb(250, 238, 218);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="-80.2" y="332" font-family="sans-serif" font-size="11" font-weight="500" fill="#412402" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">Kasıtsız düşme</text>
<text x="-80.2" y="348" font-family="sans-serif" font-size="10" fill="#633806" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">İhmal sonucu düşme → 65. madde (yük güvenliği); kasıt varsa 73/b devreye girer.</text>

<!-- ── UYGULANMAZ ── -->
