<text x="55" y="72" font-family="sans-serif" font-size="11" font-weight="600" fill="#3B6D11" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">✓  Uygulanır</text>
