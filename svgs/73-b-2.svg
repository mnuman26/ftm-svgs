<text x="-80.2" y="120" font-family="sans-serif" font-size="10" fill="#3B6D11" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Sigara, şişe, yiyecek artığı — trafik güvenliğini doğrudan tehdit eder.</text>

<!-- Satır 2 -->
<rect x="44" y="136" width="292" height="44" rx="5" fill="#EAF3DE" style="fill:rgb(234, 243, 222);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
