<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1a1a2e" rx="12"/>

  <!-- Road -->
  <rect x="0" y="85" width="200" height="30" fill="#2d2d2d"/>
  <!-- Road dashes -->
  <rect x="10" y="98" width="25" height="4" fill="#f0c040" rx="2"/>
  <rect x="50" y="98" width="25" height="4" fill="#f0c040" rx="2"/>
  <rect x="90" y="98" width="25" height="4" fill="#f0c040" rx="2"/>
  <rect x="130" y="98" width="25" height="4" fill="#f0c040" rx="2"/>
  <rect x="170" y="98" width="25" height="4" fill="#f0c040" rx="2"/>

  <!-- Arrow signs pointing RIGHT (correct direction) -->
  <g transform="translate(155, 58)">
    <rect x="-18" y="-14" width="36" height="28" fill="#1565c0" rx="4"/>
    <polygon points="-8,0 4,-8 4,8" fill="white"/>
    <rect x="4" y="-3" width="10" height="6" fill="white"/>
  </g>

  <!-- Wrong-way car (going LEFT, red, tilted slightly) -->
  <g transform="translate(70, 100) rotate(180)">
    <!-- Car body -->
    <rect x="-30" y="-12" width="60" height="22" fill="#e53935" rx="6"/>
    <!-- Roof -->
    <rect x="-16" y="-22" width="34" height="12" fill="#c62828" rx="4"/>
    <!-- Windshield -->
    <rect x="-12" y="-20" width="12" height="10" fill="#90caf9" rx="2" opacity="0.8"/>
    <rect x="2" y="-20" width="12" height="10" fill="#90caf9" rx="2" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-18" cy="10" r="6" fill="#222"/>
    <circle cx="-18" cy="10" r="3" fill="#555"/>
    <circle cx="18" cy="10" r="6" fill="#222"/>
    <circle cx="18" cy="10" r="3" fill="#555"/>
    <!-- Headlights (facing wrong way = red taillights facing forward) -->
    <rect x="-30" y="-6" width="6" height="10" fill="#ff5252" rx="2"/>
  </g>

  <!-- WRONG WAY sign -->
  <g transform="translate(100, 145)">
    <rect x="-38" y="-14" width="76" height="26" fill="#e53935" rx="4"/>
    <text x="0" y="6" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">WRONG WAY</text>
  </g>

  <!-- Exclamation / warning -->
  <g transform="translate(155, 110)">
    <circle cx="0" cy="0" r="16" fill="#f57f17" opacity="0.9"/>
    <text x="0" y="7" font-family="Arial Black" font-size="20" font-weight="900" fill="white" text-anchor="middle">!</text>
  </g>

  <!-- Skid marks behind wrong-way car -->
  <line x1="100" y1="108" x2="140" y2="110" stroke="#555" stroke-width="3" stroke-dasharray="4,3"/>
  <line x1="100" y1="114" x2="142" y2="116" stroke="#555" stroke-width="3" stroke-dasharray="4,3"/>
</svg>
