<text x="-80.2" y="220" font-family="sans-serif" font-size="10" fill="#3B6D11" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Dökmek" fiili açıkça kapsama girer; yağ, boya, kimyasal, kum vb.</text>

<!-- Satır 4 -->
<rect x="44" y="236" width="292" height="44" rx="5" fill="#EAF3DE" style="fill:rgb(234, 243, 222);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="-80.2" y="254" font-family="sans-serif" font-size="11" font-weight="500" fill="#27500A" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">Bagajdan yere bırakma</text>
<text x="-80.2" y="270" font-family="sans-serif" font-size="10" fill="#3B6D11" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Aracın kapısından veya bagajından çöp torbası, ambalaj bırakmak.</text>

<!-- ── KOŞULLU ── -->
<text x="55" y="300" font-family="sans-serif" font-size="11" font-weight="600" fill="#633806" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">⚠  Duruma bağlı</text>
