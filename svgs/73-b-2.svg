<text x="-80.2" y="410" font-family="sans-serif" font-size="11" font-weight="500" fill="#501313" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">Araç içine atma</text>
<text x="-80.2" y="426" font-family="sans-serif" font-size="10" fill="#791F1F" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Dışarıya çıkmıyorsa karayolu tanımına girmez, madde uygulanmaz.</text>

<!-- Satır 2 -->
<rect x="44" y="442" width="292" height="44" rx="5" fill="#FCEBEB" style="fill:rgb(252, 235, 235);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="-80.2" y="460" font-family="sans-serif" font-size="11" font-weight="500" fill="#501313" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">Özel mülk / kapalı otopark</text>
<text x="-80.2" y="476" font-family="sans-serif" font-size="10" fill="#791F1F" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Karayolu tanımına girmeyen yerlerde belediye mevzuatı geçerli, 73/b değil.</text>
